<div class="pre" #hostEl>
  <!-- Noise texture -->
  <div class="pre__noise" aria-hidden="true"></div>

  <!-- Three large word rows that sweep into view -->
  <div class="pre__words" aria-hidden="true">
    <div class="pre__row">
      <span class="pre__mask"
        ><span class="pre__word" #word1El>L'IMMOBILIER</span></span
      >
    </div>
    <div class="pre__row">
      <span class="pre__mask"
        ><span class="pre__word" #word2El>SIMPLIFIÉ</span></span
      >
    </div>
    <div class="pre__row pre__row--accent">
      <span class="pre__mask"
        ><span class="pre__word" #word3El>AVEC&nbsp;UBAX</span></span
      >
    </div>
  </div>

  <!-- Numeric counter (bottom-right) -->
  <div class="pre__meta" aria-live="polite" aria-label="Chargement en cours">
    <span class="pre__count" #countEl>00</span><span class="pre__pct">%</span>
  </div>

  <!-- Orange progress line at bottom edge -->
  <div class="pre__track">
    <progress
      class="pre__fill"
      #fillEl
      aria-label="Chargement"
      value="0"
      max="100"
    ></progress>
  </div>
</div>
