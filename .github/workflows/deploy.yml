# ===================================================================
# UBAX Frontend – CI : Build → Push Docker Hub → Deploy VPS
# ===================================================================
#
# Branches :
#   develop → images :develop
#   main    → images :latest + :main + :sha-{short}
#
# Images Docker Hub :
#   ubaxproject/ubax-portail  → Frontend Portail Angular (ubax-portal)
#   ubaxproject/ubax-admin    → Frontend Admin Angular  (ubax-web)
#
# Secrets requis :
#   DOCKER_HUB_USERNAME · DOCKER_HUB_TOKEN
#   VPS_HOST · VPS_USER · VPS_SSH_PRIVATE_KEY
# ===================================================================

name: CI – Build & Deploy

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1a – Build & Push Docker Hub : ubax-portail
  # ═══════════════════════════════════════════════════════════════
  build-push-portail:
    name: 🐳 Stage 1a – Build & Push ubax-portail
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract Docker metadata (portail)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ubaxproject/ubax-portail
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ubax-portail
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ubax-portal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=ubax-portail
          cache-to: type=gha,mode=max,scope=ubax-portail

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1b – Build & Push Docker Hub : ubax-admin
  # ═══════════════════════════════════════════════════════════════
  build-push-admin:
    name: 🐳 Stage 1b – Build & Push ubax-admin
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract Docker metadata (admin)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ubaxproject/ubax-admin
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ubax-admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ubax-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=ubax-admin
          cache-to: type=gha,mode=max,scope=ubax-admin

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2 – Deploy to VPS
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Stage 2 – Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-push-portail, build-push-admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          use_insecure_cipher: true
          source: >-
            docker/docker-compose.frontend.vps.yml,
            docker/nginx/nginx.conf
          target: /opt/ubax/
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 180s
          use_insecure_cipher: true
          script: |
            set -e
            cd /opt/ubax

            TAG="${{ needs.build-push-portail.outputs.image-tag }}"
            echo "==> Déploiement tag : $TAG"

            # Mettre à jour les tags dans .env (ajouter si absent)
            grep -q "^PORTAIL_TAG=" .env \
              && sed -i "s/^PORTAIL_TAG=.*/PORTAIL_TAG=$TAG/" .env \
              || echo "PORTAIL_TAG=$TAG" >> .env

            grep -q "^ADMIN_TAG=" .env \
              && sed -i "s/^ADMIN_TAG=.*/ADMIN_TAG=$TAG/" .env \
              || echo "ADMIN_TAG=$TAG" >> .env

            # Connexion Docker Hub
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Pull nouvelles images frontend (retry x3 en cas d'erreur réseau)
            for IMAGE in ubaxproject/ubax-portail:$TAG ubaxproject/ubax-admin:$TAG; do
              pulled=false
              for attempt in 1 2 3; do
                echo "==> Pull $IMAGE tentative $attempt/3"
                if docker pull $IMAGE; then
                  pulled=true
                  break
                fi
                [ $attempt -lt 3 ] && echo "Retry dans 15s..." && sleep 15
              done
              $pulled || { echo "❌ Pull $IMAGE échoué après 3 tentatives"; exit 1; }
            done

            # Démarrer / mettre à jour les services frontend
            docker compose -f docker-compose.frontend.vps.yml up -d --remove-orphans

            # Recharger nginx pour activer les nouveaux upstreams frontend
            docker exec ubax-nginx-prod nginx -s reload || true

            # Nettoyage des anciennes images
            docker image prune -f

            echo "==> Déploiement frontend terminé ✓"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – Health Check post-déploiement
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: 🏥 Stage 3 – Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check – ubax-portail (/)
        run: |
          echo "Vérification du portail (max 2 min)..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.VPS_HOST }}/)
            echo "Attempt $i/12 – HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Portail healthy"
              break
            fi
            [ $i -eq 12 ] && echo "⚠️  Portail non disponible après 2 min"
            sleep 10
          done

      - name: Health check – ubax-admin (/admin/)
        run: |
          echo "Vérification de l'admin (max 2 min)..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.VPS_HOST }}/admin/)
            echo "Attempt $i/12 – HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Admin healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Admin health check failed après 2 min"
          exit 1

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-portal:
    name: Deploy ubax-portal
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info (portal)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}

      - name: Build ubax-portal
        run: npx nx build ubax-portal --configuration=production

      - name: Prepare Vercel output structure (portal)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/apps/ubax-portal/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy ubax-portal to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}

  deploy-web:
    name: Deploy ubax-web
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info (web)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Build ubax-web
        run: npx nx build ubax-web --configuration=production

      - name: Prepare Vercel output structure (web)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/apps/ubax-web/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy ubax-web to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
