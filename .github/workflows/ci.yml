name: CI – Branch Check

on:
  push:
    branches:
      - "feature/**"
      - "hotfix/**"
      - "bugfix/**"
    paths-ignore:
      - "**.md"
      - "docker/**"
      - ".gitignore"
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"
      - "docker/**"
      - ".gitignore"

jobs:

  # STAGE 0 – Lint
  lint:
    name: 🔍 Stage 0 – Workspace Lint
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Lint workspace critical graph
        run: npm run lint:workspace

  test:
    name: 🧪 Stage 1 – Workspace Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Run workspace critical tests
        run: npm run test:workspace

  # STAGE 2 – Build check (les deux apps)
  build:
    name: 🏗️ Stage 2 – Build Check
    runs-on: ubuntu-latest
    needs: test
    env:
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Build workspace deployables
        run: npm run build:workspace

      - name: Publier les artefacts de build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-${{ github.run_id }}
          path: |
            dist/apps/ubax-portal/
            dist/apps/ubax-web/
          if-no-files-found: ignore
          retention-days: 3
