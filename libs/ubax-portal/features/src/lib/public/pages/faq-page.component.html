<ubax-public-shell>
  <section class="faq-wrap">
    <div class="intro">
      <h1>Foire Aux Questions (FAQ)</h1>
      <p>Retrouvez les reponses aux questions les plus frequentes.</p>

      <ubax-ui-card>
        <h3>Vous avez encore des questions ?</h3>
        <p>Notre equipe est disponible pour vous accompagner.</p>
        <ubax-ui-button variant="dark">Contacter le support</ubax-ui-button>
      </ubax-ui-card>
    </div>

    <div class="faq-list">
      <ubax-ui-accordion [items]="items"></ubax-ui-accordion>
    </div>
  </section>
</ubax-public-shell>
