<section class="recovery-flow recovery-flow--reset">
    <div class="recovery-flow__intro">
      <h1 class="recovery-flow__title">Créer un nouveau mot de passe</h1>
    </div>

    <article class="recovery-card recovery-card--reset">
      <form
        class="recovery-form"
        (ngSubmit)="onSubmit()"
        aria-label="Création d'un nouveau mot de passe"
        novalidate
      >
        <div class="recovery-fieldset recovery-fieldset--stacked">
          <label class="recovery-visually-hidden" for="new-password-input"
            >Nouveau mot de passe</label
          >
          <p-password
            [(ngModel)]="newPassword"
            name="newPassword"
            inputId="new-password-input"
            [toggleMask]="false"
            [feedback]="false"
            placeholder="Nouveau mot de passe"
            [fluid]="true"
            styleClass="recovery-password"
            [pt]="{
              pcInputText: {
                root: { autocomplete: 'new-password' },
              },
            }"
          ></p-password>

          <label class="recovery-visually-hidden" for="confirm-password-input"
            >Confirmer le mot de passe</label
          >
          <p-password
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            inputId="confirm-password-input"
            [toggleMask]="false"
            [feedback]="false"
            placeholder="Confirmer le mot de passe"
            [fluid]="true"
            styleClass="recovery-password"
            [pt]="{
              pcInputText: {
                root: { autocomplete: 'new-password' },
              },
            }"
          ></p-password>
        </div>

        <p-button
          type="submit"
          styleClass="recovery-btn"
          [fluid]="true"
          label="Réinitialiser le mot de passe"
          [disabled]="!canSubmitReset"
        ></p-button>
      </form>
    </article>
  </section>
