<section class="login-stage">
  <!-- Floating icon badges — fixed positions, animated in place -->
  <div class="orbit orbit--top-left" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 195.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/ri_hotel-fill.svg"
      alt=""
    />
  </div>
  <div class="orbit orbit--top-right" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 195.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/ic_outline-bed.svg"
      alt=""
    />
  </div>
  <div class="orbit orbit--mid-left" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 195.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/material-symbols-light_flights-and-hotels.svg"
      alt=""
    />
  </div>
  <div class="orbit orbit--mid-right" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 195.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/bitcoin-icons_two-keys-outline.svg"
      alt=""
    />
  </div>
  <div class="orbit orbit--bot-left" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 194.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/bi_suitcase2-fill.svg"
      alt=""
    />
  </div>
  <div class="orbit orbit--bot-right" aria-hidden="true">
    <img
      class="orbit__circle"
      src="assets/portal-assets/login/icons/Ellipse 194.svg"
      alt=""
    />
    <img
      class="orbit__icon"
      src="assets/portal-assets/login/icons/ri_building-2-fill.svg"
      alt=""
    />
  </div>

  <!-- UBAX logo floating above form -->
  <div class="login-logo">
    <img
      src="assets/portal-assets/login/icons/Group 1171274746-2.svg"
      alt="UBAX"
      loading="eager"
      decoding="async"
      width="112"
      height="112"
    />
  </div>

  <!-- Login form card -->
  <article class="login-card">
    <form
      class="login-form"
      (ngSubmit)="onSubmit()"
      aria-label="Formulaire de connexion"
      [attr.aria-busy]="submitting()"
      novalidate
    >
      <!-- Email field -->
      <div class="field-group--email">
        <label class="field-label" for="email-input">Email</label>
        <input
          pInputText
          id="email-input"
          class="email-input"
          type="email"
          inputmode="email"
          placeholder="xxxxxxx@gmail.com"
          autocomplete="email"
          [(ngModel)]="email"
          name="email"
        />
      </div>

      <!-- Password field -->
      <div class="field-group--password">
        <label class="field-label" for="password-input">Mot de passe</label>
        <div class="password-row">
          <img
            class="password-icon--lock"
            src="assets/portal-assets/login/icons/formkit_password.svg"
            alt=""
            aria-hidden="true"
          />
          <p-password
            [(ngModel)]="password"
            name="password"
            inputId="password-input"
            [toggleMask]="true"
            [feedback]="false"
            placeholder="••••••••"
            [fluid]="true"
            styleClass="password-field"
            [pt]="{
              pcInputText: { root: { autocomplete: 'current-password' } },
            }"
          >
            <ng-template #hideicon>
              <img
                class="password-visibility-icon"
                src="assets/portal-assets/login/icons/akar-icons_eye-opened.svg"
                alt=""
                aria-hidden="true"
              />
            </ng-template>
            <ng-template #showicon>
              <img
                class="password-visibility-icon password-visibility-icon--active"
                src="assets/portal-assets/login/icons/akar-icons_eye-closed.svg"
                alt=""
                aria-hidden="true"
              />
            </ng-template>
          </p-password>
        </div>
      </div>

      <!-- Submit button -->
      <p-button
        label="Se connecter"
        type="submit"
        styleClass="login-submit-btn"
        [disabled]="submitting()"
        [fluid]="true"
        [loading]="submitting()"
      ></p-button>

      @if (serverError(); as serverError) {
        <p class="login-form__error" role="alert">{{ serverError }}</p>
      }

      <!-- Bottom links -->
      <div class="login-footer-links">
        <a routerLink="/mot-de-passe-oublie" class="help-link"
          >Mot de passe oublié ?</a
        >
      </div>
    </form>
  </article>
</section>
