<section class="recovery-flow">
  <div class="recovery-flow__intro">
    <h1 class="recovery-flow__title">Mot de passe oublié ?</h1>
    <p class="recovery-flow__description">
      Entrez votre adresse mail associée à votre compte UBAX.<br />
      Nous vous enverrons un code de vérification par mail pour réinitialiser
      votre mot de passe.
    </p>
  </div>

  <article class="recovery-card recovery-card--phone">
    <form
      class="recovery-form"
      (ngSubmit)="onSubmit()"
      aria-label="Demande de code de récupération"
      novalidate
    >
      <div class="recovery-fieldset">
        <label class="recovery-label" for="forgot-phone-input"
          >Saisir votre adresse mail</label
        >

        <div class="recovery-phone-row">
          <p-select
            [(ngModel)]="selectedCountry"
            name="countryCode"
            inputId="forgot-country-code-input"
            [options]="countries"
            optionLabel="name"
            appendTo="body"
            styleClass="recovery-country-picker"
            panelStyleClass="country-picker-overlay"
            [showClear]="false"
            aria-label="Indicatif téléphonique"
          >
            <ng-template #selectedItem let-country>
              <div class="cp-trigger">
                <span class="cp-flag-badge" aria-hidden="true">
                  <img
                    class="cp-flag-image"
                    [src]="country?.flagUrl"
                    [alt]="''"
                  />
                </span>
                <span class="cp-dial">+{{ country?.dialCode }}</span>
              </div>
            </ng-template>

            <ng-template #dropdownicon>
              <img
                class="cp-dropdown-icon"
                src="assets/portal-assets/login/icons/solar_alt-arrow-down-linear.svg"
                alt=""
                aria-hidden="true"
              />
            </ng-template>

            <ng-template #item let-country>
              <div class="cp-item">
                <span
                  class="cp-flag-badge cp-flag-badge--option"
                  aria-hidden="true"
                >
                  <img
                    class="cp-flag-image"
                    [src]="country.flagUrl"
                    [alt]="''"
                  />
                </span>
                <span class="cp-item-name">{{ country.name }}</span>
                <span class="cp-item-dial">+{{ country.dialCode }}</span>
              </div>
            </ng-template>
          </p-select>

          <input
            pInputText
            id="forgot-phone-input"
            class="recovery-phone-input"
            type="tel"
            placeholder="07 12 34 56 78"
            autocomplete="tel"
            [(ngModel)]="phone"
            name="phone"
          />
        </div>
      </div>

      <p-button
        type="submit"
        styleClass="recovery-btn"
        [fluid]="true"
        label="Recevoir un code"
        [disabled]="!canRequestCode"
      ></p-button>
    </form>
  </article>
</section>
