<section class="recovery-flow">
  <div class="recovery-flow__intro">
    <h1 class="recovery-flow__title">Mot de passe oublié ?</h1>
    <p class="recovery-flow__description">
      Entrez votre adresse mail associée à votre compte UBAX.<br />
      Nous vous enverrons un code de vérification par mail pour réinitialiser
      votre mot de passe.
    </p>
  </div>

  <article class="recovery-card recovery-card--email">
    <form
      class="recovery-form"
      (ngSubmit)="onSubmit()"
      aria-label="Demande de code de récupération"
      novalidate
    >
      <div class="recovery-fieldset recovery-fieldset--email">
        <label class="recovery-label" for="forgot-phone-input"
          >Saisir votre adresse mail</label
        >

        <input
          pInputText
          id="forgot-email-input"
          class="recovery-email-input"
          type="email"
          inputmode="email"
          placeholder="xxxxxxxxxxxxx@mail.com"
          autocomplete="email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <p-button
        type="submit"
        styleClass="recovery-btn"
        [fluid]="true"
        label="Recevoir un code"
        [disabled]="!canRequestCode"
      ></p-button>
    </form>
  </article>
</section>
