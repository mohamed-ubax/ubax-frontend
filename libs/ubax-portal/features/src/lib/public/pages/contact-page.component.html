<ubax-public-shell>
  <section class="contact-wrap">
    <header>
      <h1>Besoin d'aide ? Notre equipe est a votre ecoute</h1>
      <p>Contactez-nous facilement par le canal qui vous convient.</p>
    </header>

    <div class="contact-grid">
      <form class="contact-form">
        <h2>Envoyez un message</h2>
        <div class="row">
          <ubax-ui-input label="Prenom" placeholder="Votre prenom" />
          <ubax-ui-input label="Nom" placeholder="Votre nom" />
        </div>
        <div class="row">
          <ubax-ui-input type="email" label="Email" placeholder="email@ubax.io" />
          <ubax-ui-input type="tel" label="Telephone" placeholder="+225 xx xx xx xx" />
        </div>
        <label class="message-field">
          <span>Message</span>
          <textarea rows="6" placeholder="Ecrivez votre message"></textarea>
        </label>
        <ubax-ui-button variant="dark">Envoyer</ubax-ui-button>
      </form>

      <aside class="support-panel">
        <h3>Bonjour ! Nous sommes la pour vous aider</h3>
        <div class="contact-item">Support: +225 01 02 03 04 05</div>
        <div class="contact-item">SMS / WhatsApp: +225 01 02 03 04 05</div>
        <div class="contact-item">Email: support@ubax.io</div>
      </aside>
    </div>
  </section>
</ubax-public-shell>
