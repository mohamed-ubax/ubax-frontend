<ubax-public-shell>
  <section class="auth-wrap">
    <article class="auth-card auth-stage">
      <div class="auth-logo">U</div>
      <h1>Creer un nouveau mot de passe</h1>
      <ubax-ui-input type="password" placeholder="Nouveau mot de passe" />
      <ubax-ui-input type="password" placeholder="Confirmer le mot de passe" />
      <ubax-ui-button variant="dark" [block]="true"
        >Reinitialiser le mot de passe</ubax-ui-button
      >
    </article>
  </section>
</ubax-public-shell>
