<ubax-public-shell>
  <section class="auth-wrap">
    <article class="auth-card">
      <h1>Se connecter</h1>
      <p>Connectez-vous avec votre numero de telephone et mot de passe.</p>
      <input type="tel" placeholder="Numero de telephone" />
      <input type="password" placeholder="Mot de passe" />
      <button type="button">Se connecter</button>
      <a routerLink="/mot-de-passe-oublie">Reinitialiser votre mot de passe</a>
    </article>
  </section>
</ubax-public-shell>
