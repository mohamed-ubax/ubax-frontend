<ubax-public-shell>
  <section class="auth-wrap">
    <article class="auth-card">
      <h1>Mot de passe oublie ?</h1>
      <p>
        Entrez votre numero de telephone associe a votre compte UBAX pour
        recevoir un code de verification.
      </p>
      <ubax-ui-input type="tel" label="Numero de telephone" placeholder="07 12 34 56 78" />
      <a routerLink="/verification-code" class="action-link">
        <ubax-ui-button variant="dark" [block]="true">Recevoir un code</ubax-ui-button>
      </a>
    </article>
  </section>
</ubax-public-shell>
