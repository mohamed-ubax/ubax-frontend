<div class="dlg-overlay" (click)="cancel.emit()">
  <div class="dlg" (click)="$event.stopPropagation()">

    <div class="dlg__icon">
      <i class="pi pi-trash"></i>
    </div>

    <h2 class="dlg__title">Annuler ce contrat ?</h2>

    <p class="dlg__message">
      Le contrat sera <strong>définitivement annulé</strong>. Cette action est irréversible.
    </p>

    <div class="dlg__actions">
      <button class="dlg-btn dlg-btn--ghost" (click)="cancel.emit()" [disabled]="loading()">
        Retour
      </button>
      <button class="dlg-btn dlg-btn--danger" (click)="confirm.emit()" [disabled]="loading()">
        @if (loading()) {
          <i class="pi pi-spin pi-spinner"></i> Annulation…
        } @else {
          Confirmer l'annulation
        }
      </button>
    </div>

  </div>
</div>
