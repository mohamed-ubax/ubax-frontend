<header
  class="ubax-topbar"
  [class.ubax-topbar--compact]="isCompactNav()"
  [class.ubax-topbar--menu-open]="isCompactNav() && isMobileNavOpen()"
  [class.ubax-topbar--scrolled]="isScrolled()"
>
  <div class="topbar-inner" #topbarInner>
    <!-- Logo -->
    <a
      routerLink="/tableau-de-bord"
      class="topbar-logo"
      #topbarLogo
      aria-label="Accueil Ubax"
      (click)="closeMobileMenu()"
    >
      <img [src]="logoSrc()" alt="Ubax" />
    </a>

    <!-- Navigation principale -->
    <div class="topbar-nav-shell" #navShell>
      <nav
        class="topbar-nav"
        #navList
        aria-label="Navigation principale"
        ubaxMorphTabs
        ubaxMorphTabsItemSelector=".topbar-nav__item"
      >
        @for (item of visibleItems(); track item.path) {
          <a
            [routerLink]="item.path"
            [class.is-active]="isItemActive(item)"
            class="topbar-nav__item"
            (click)="closeMobileMenu()"
            >{{ item.label }}</a
          >
        }
      </nav>
    </div>

    <!-- Actions droite -->
    <div class="topbar-actions" #topbarActions>
      @if (isCompactNav()) {
        <button
          class="topbar-icon-btn topbar-menu-btn"
          #menuButton
          type="button"
          [attr.aria-expanded]="isMobileNavOpen()"
          [attr.aria-label]="
            isMobileNavOpen() ? 'Fermer la navigation' : 'Ouvrir la navigation'
          "
          (click)="toggleMobileMenu()"
        >
          <i
            class="pi"
            [class.pi-bars]="!isMobileNavOpen()"
            [class.pi-times]="isMobileNavOpen()"
          ></i>
        </button>
      }
      <button class="topbar-icon-btn" type="button" aria-label="Notifications">
        <i class="pi pi-bell"></i>
        <span class="topbar-icon-btn__badge">{{ notificationCount }}</span>
      </button>
      <button class="topbar-icon-btn" type="button" aria-label="Paramètres">
        <i class="pi pi-cog"></i>
      </button>

      <div class="topbar-user-wrapper">
        <button
          class="topbar-user"
          type="button"
          [class.topbar-user--open]="isUserMenuOpen()"
          [attr.aria-expanded]="isUserMenuOpen()"
          aria-label="Menu utilisateur"
          (click)="toggleUserMenu($event)"
        >
          <span class="topbar-user__avatar" aria-hidden="true">
            @if (avatarSrc(); as avatarSrc) {
              <img
                [src]="avatarSrc"
                [alt]="authStore.fullName() || 'Utilisateur Ubax'"
              />
            } @else {
              <span class="topbar-user__initial">{{ avatarLabel() }}</span>
            }
          </span>
          <div class="topbar-user__info">
            <span class="topbar-user__name">{{ authStore.fullName() }}</span>
            <span class="topbar-user__role">{{ roleLabel() }}</span>
          </div>
          <i class="pi pi-chevron-down topbar-user__chevron" aria-hidden="true"></i>
        </button>

        @if (isUserMenuOpen()) {
          <div class="user-menu" role="menu" (click)="$event.stopPropagation()">
            <div class="user-menu__header">
              <span class="user-menu__avatar" aria-hidden="true">
                @if (avatarSrc(); as avatarSrc) {
                  <img
                    [src]="avatarSrc"
                    [alt]="authStore.fullName() || 'Utilisateur Ubax'"
                  />
                } @else {
                  <span class="user-menu__initial">{{ avatarLabel() }}</span>
                }
              </span>
              <div class="user-menu__identity">
                <span class="user-menu__name">{{ authStore.fullName() }}</span>
                <span class="user-menu__role">{{ roleLabel() }}</span>
                <span class="user-menu__email">{{ authStore.user()?.email }}</span>
              </div>
            </div>

            <div class="user-menu__divider"></div>

            <div class="user-menu__group">
              <button class="user-menu__item" type="button" role="menuitem">
                <i class="pi pi-user" aria-hidden="true"></i>
                Mon profil
              </button>
              <button class="user-menu__item" type="button" role="menuitem">
                <i class="pi pi-cog" aria-hidden="true"></i>
                Paramètres
              </button>
            </div>

            <div class="user-menu__divider"></div>

            <div class="user-menu__group">
              <button
                class="user-menu__item user-menu__item--danger"
                type="button"
                role="menuitem"
                (click)="logout()"
              >
                <i class="pi pi-sign-out" aria-hidden="true"></i>
                Se déconnecter
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</header>
