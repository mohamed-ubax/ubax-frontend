@if (enabled()) {
  <aside
    class="dev-role-switcher"
    aria-label="Sélecteur de rôle de développement"
  >
    <p class="dev-role-switcher__eyebrow">Mode dev</p>
    <div class="dev-role-switcher__body">
      <label class="dev-role-switcher__field">
        <span class="dev-role-switcher__label">Rôle simulé</span>
        <span class="dev-role-switcher__select-shell">
          <select
            class="dev-role-switcher__select"
            (change)="onRoleChange($any($event.target).value)"
          >
            @for (option of roleOptions; track option.role) {
              <option
                [value]="option.role"
                [selected]="option.role === selectedRole()"
              >
                {{ option.label }}
              </option>
            }
          </select>
          <i class="pi pi-chevron-down" aria-hidden="true"></i>
        </span>
      </label>
      <p class="dev-role-switcher__hint">
        Menus et gardes suivent ce rôle immédiatement.
      </p>
    </div>
  </aside>
}
