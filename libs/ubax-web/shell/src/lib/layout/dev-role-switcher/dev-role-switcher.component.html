@if (enabled()) {
  <aside
    class="dev-role-switcher"
    aria-label="Sélecteur de profil de développement"
  >
    <p class="dev-role-switcher__eyebrow">Mode dev</p>
    <div class="dev-role-switcher__body">
      <label class="dev-role-switcher__field">
        <span class="dev-role-switcher__label">Profil simulé</span>
        <span class="dev-role-switcher__select-shell">
          <select
            class="dev-role-switcher__select"
            (change)="onProfileChange($any($event.target).value)"
          >
            @for (profile of devProfiles; track profile.label) {
              <option
                [value]="profile.label"
                [selected]="profile.label === selectedLabel()"
              >
                {{ profile.label }}
              </option>
            }
          </select>
          <i class="pi pi-chevron-down" aria-hidden="true"></i>
        </span>
      </label>
      <p class="dev-role-switcher__hint">
        Menus et gardes suivent ce profil immédiatement.
      </p>
    </div>
  </aside>
}
