<div class="form-select">
  @if (label()) {
    <span class="form-select__label">{{ label() }}</span>
  }

  <div class="form-select__wrapper">
    <button
      class="form-select__trigger"
      [class.form-select__trigger--with-icon]="leadingIconSrc()"
      [class.is-open]="isOpen()"
      [class.is-disabled]="disabled()"
      [disabled]="disabled()"
      type="button"
      (click)="toggle()"
    >
      @if (leadingIconSrc()) {
        <span class="form-select__leading-icon" aria-hidden="true">
          <img [src]="leadingIconSrc()" alt="" />
        </span>
      }

      <span class="form-select__display">{{ value() }}</span>

      <span class="form-select__chevron" aria-hidden="true">
        <i class="pi pi-angle-down"></i>
      </span>
    </button>
  </div>

  <ng-template #menuTpl>
    <div
      class="form-select__menu"
      [style.top.px]="menuTop()"
      [style.left.px]="menuLeft()"
      [style.width.px]="menuWidth()"
      [style.max-height.px]="menuMaxHeight()"
    >
      @for (option of options(); track option) {
        <button
          class="form-select__option"
          [class.is-active]="value() === option"
          type="button"
          (click)="select(option)"
        >
          <span class="form-select__option-label">{{ option }}</span>

          @if (value() === option) {
            <span class="form-select__option-check" aria-hidden="true">
              <i class="pi pi-check"></i>
            </span>
          }
        </button>
      }
    </div>
  </ng-template>
</div>
