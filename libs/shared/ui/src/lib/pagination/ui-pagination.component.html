<nav
  class="ui-pagination"
  [class.ui-pagination--glass]="variant() === 'glass'"
  [class.ui-pagination--light]="variant() === 'light'"
  [class.ui-pagination--members]="variant() === 'members'"
  [attr.aria-label]="ariaLabel()"
>
  <button
    class="ui-pagination__arrow"
    type="button"
    [disabled]="currentPage() === 1"
    (click)="onPageChange(currentPage() - 1)"
    aria-label="Page précédente"
  >
    @if (arrowLeftSrc()) {
      <img [src]="arrowLeftSrc()" alt="" aria-hidden="true" />
    }
  </button>

  @for (item of visibleItems(); track item.trackKey) {
    @if (item.kind === 'page') {
      <button
        class="ui-pagination__page"
        [class.ui-pagination__page--active]="item.page === currentPage()"
        type="button"
        (click)="onPageChange(item.page)"
        [attr.aria-label]="item.ariaLabel"
        [attr.aria-current]="item.page === currentPage() ? 'page' : null"
      >
        {{ item.page }}
      </button>
    } @else {
      <button
        class="ui-pagination__gap"
        [class.ui-pagination__gap--backward]="item.direction === 'backward'"
        [class.ui-pagination__gap--forward]="item.direction === 'forward'"
        type="button"
        (click)="onPageChange(item.targetPage)"
        [attr.aria-label]="item.ariaLabel"
        [attr.title]="item.ariaLabel"
      >
        <span aria-hidden="true">…</span>
      </button>
    }
  }

  <button
    class="ui-pagination__arrow"
    type="button"
    [disabled]="currentPage() === totalPages()"
    (click)="onPageChange(currentPage() + 1)"
    aria-label="Page suivante"
  >
    @if (arrowRightSrc()) {
      <img [src]="arrowRightSrc()" alt="" aria-hidden="true" />
    }
  </button>
</nav>
