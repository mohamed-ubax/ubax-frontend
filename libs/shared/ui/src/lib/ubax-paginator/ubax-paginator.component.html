<div class="paginator" [class.paginator--white]="variant() === 'white'">
  <button
    class="paginator-arrow"
    (click)="prev()"
    [disabled]="currentPage() === 1"
  >
    @if (previousIconSrc(); as previousIconSrc) {
      <img class="paginator-arrow__icon" [src]="previousIconSrc" alt="" />
    } @else {
      <i class="pi pi-chevron-left"></i>
    }
    <span class="paginator-arrow__label">Page précédente</span>
  </button>

  <div class="paginator-pages">
    @for (page of pages(); track page) {
      <button
        class="paginator-page"
        [class.is-active]="page === currentPage()"
        (click)="goTo(page)"
      >
        {{ page }}
      </button>
    }
  </div>

  <button
    class="paginator-arrow"
    (click)="next()"
    [disabled]="currentPage() === totalPages()"
  >
    @if (nextIconSrc(); as nextIconSrc) {
      <img class="paginator-arrow__icon" [src]="nextIconSrc" alt="" />
    } @else {
      <i class="pi pi-chevron-right"></i>
    }
    <span class="paginator-arrow__label">Page suivante</span>
  </button>
</div>
