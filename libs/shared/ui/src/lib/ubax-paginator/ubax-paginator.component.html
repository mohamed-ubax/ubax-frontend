<nav class="paginator" [class.paginator--white]="variant() === 'white'" aria-label="Pagination">

  <!-- Bouton Précédent -->
  <button
    class="paginator-arrow paginator-arrow--prev"
    type="button"
    (click)="prev()"
    [disabled]="currentPage() === 1"
    aria-label="Page précédente"
  >
    @if (previousIconSrc(); as src) {
      <img class="paginator-arrow__icon" [src]="src" alt="" />
    } @else {
      <i class="pi pi-angle-left"></i>
    }
  </button>

  <!-- Pages + ellipsis -->
  <div class="paginator-pages">
    @for (item of pageItems(); track trackByItem($index, item)) {
      @if (item.type === 'page') {
        <button
          class="paginator-page"
          type="button"
          [class.is-active]="item.value === currentPage()"
          (click)="goTo(item.value)"
          [attr.aria-current]="item.value === currentPage() ? 'page' : null"
          [attr.aria-label]="'Page ' + item.value"
        >
          {{ item.value }}
        </button>
      } @else {
        <span class="paginator-ellipsis" aria-hidden="true">…</span>
      }
    }
  </div>

  <!-- Bouton Suivant -->
  <button
    class="paginator-arrow paginator-arrow--next"
    type="button"
    (click)="next()"
    [disabled]="currentPage() === totalPages()"
    aria-label="Page suivante"
  >
    @if (nextIconSrc(); as src) {
      <img class="paginator-arrow__icon" [src]="src" alt="" />
    } @else {
      <i class="pi pi-angle-right"></i>
    }
  </button>

</nav>
