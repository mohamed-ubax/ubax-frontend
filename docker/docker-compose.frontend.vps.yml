services:

  # ─────────────────────────────────────────────────────────────────
  # ubax-portail – Frontend Portail public (route /)
  # ─────────────────────────────────────────────────────────────────
  portail:
    image: ubaxproject/ubax-portail:${PORTAIL_TAG:-latest}
    container_name: ubax-portail-prod
    restart: unless-stopped
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # ubax-web-admin – Frontend Admin (route /admin/)
  # ─────────────────────────────────────────────────────────────────
  web-admin:
    image: ubaxproject/ubax-admin:${ADMIN_TAG:-latest}
    container_name: ubax-web-prod
    restart: unless-stopped
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ─── Réseau partagé avec les services backend ────────────────────
# Le réseau ubax-prod-net est créé par docker-compose.vps.yml
networks:
  ubax-net:
    external: true
    name: ubax-prod-net
