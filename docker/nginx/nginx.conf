
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # DNS interne Docker
    # Résolution dynamique des upstreams à la requête (pas au démarrage)
    # Évite le crash nginx si un conteneur n'est pas encore démarré
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tous les upstreams sont résolus via des variables (proxy_pass $var)
    # pour éviter le crash nginx au reload si un conteneur est absent.

    # Serveur principal
    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Backend API Spring Boot
        location /api/ {
            set $backend_upstream "http://backend:8080";
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Swagger UI
        location /api/swagger-ui/ {
            set $backend_upstream "http://backend:8080";
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Keycloak IAM
        location /auth/ {
            set $keycloak_upstream "http://keycloak:8080";
            proxy_pass         $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }

        # Frontend Admin (/admin/)
        # ubax-web buildé avec --base-href=/admin/
        # Variable → résolution DNS dynamique via resolver 127.0.0.11
        location /admin/ {
            set $admin_upstream "http://ubax-web-prod:80";
            rewrite ^/admin/(.*) /$1 break;
            proxy_pass         $admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend Portail (racine)
        # Variable → résolution DNS dynamique via resolver 127.0.0.11
        location / {
            set $portail_upstream "http://ubax-portail-prod:80";
            proxy_pass         $portail_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check nginx ────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
