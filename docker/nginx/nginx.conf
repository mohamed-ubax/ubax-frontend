# ===================================================================
# Nginx – Reverse Proxy UBAX Platform (Production – Complet)
# ===================================================================
#
# Routing :
#   /api/*     → backend:8080          (Spring Boot)
#   /auth/*    → keycloak:8080         (Keycloak IAM)
#   /admin/    → ubax-web-prod:80      (Frontend Admin Angular)
#   /          → ubax-portail-prod:80  (Frontend Portail Angular)
#
# ⚠️  Ce fichier remplace docker/nginx/nginx.conf du backend.
#     Il est déployé par le workflow frontend et maintient
#     la configuration complète (backend + frontends).
# ===================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ─── Compression gzip ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ─── Upstream services ────────────────────────────────────────
    upstream backend {
        server backend:8080;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    upstream portail {
        server ubax-portail-prod:80;
    }

    upstream web-admin {
        server ubax-web-prod:80;
    }

    # ─── Serveur principal ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── Backend API Spring Boot ───────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Swagger UI ────────────────────────────────────────────
        location /api/swagger-ui/ {
            proxy_pass         http://backend/api/swagger-ui/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Keycloak IAM ─────────────────────────────────────────
        location /auth/ {
            proxy_pass         http://keycloak/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }

        # ── Frontend Admin (/admin/) ──────────────────────────────
        # ubax-web buildé avec --base-href=/admin/
        # Le préfixe /admin/ est retiré avant d'être transmis au conteneur
        location /admin/ {
            proxy_pass         http://web-admin/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Frontend Portail (racine) ─────────────────────────────
        location / {
            proxy_pass         http://portail/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check nginx ────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
